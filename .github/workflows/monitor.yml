name: Nexus Trader Monitor

on:
  schedule:
    # Runs at 20 minutes past every hour to allow candle close
    - cron: "20 * * * *" 
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  run-nexus-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      contents: write # Required to push the .db file back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for a clean git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Verify Project Structure
        run: |
          echo "🔍 Checking for critical files..."
          [ -f trainer_daemon.py ] || (echo "❌ trainer_daemon.py missing" && exit 1)
          [ -d notifications ] || (echo "❌ notifications directory missing" && exit 1)
          [ -f notifications/discord.py ] || (echo "❌ notifications/discord.py missing" && exit 1)
          mkdir -p data
          echo "✅ Project structure verified."

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # sqlite3 is BUILT-IN to Python, so we only install external libs
          pip install ccxt requests pandas scikit-learn

      - name: Execute Nexus Predictive Engine
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          echo "🚀 Starting Predictive Cycle at $(date -u)"
          python trainer_daemon.py
          echo "✅ Cycle Complete"

      - name: Persist Data to Repository
        if: always() # Ensures data is saved even if one coin fails
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add in case it was in .gitignore previously
          git add -f data/trading.db
          
          # Commit only if changes exist, using [skip ci] to prevent loops
          git commit -m "Nexus Data Sync: $(date -u) [skip ci]" || echo "No changes to commit"
          git push origin main
